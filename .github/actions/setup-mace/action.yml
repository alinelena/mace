name: Setup MACE
description: >
  Set up Python with pip caching, install mace with the requested extras, and
  log the resulting environment. Checkout must happen before using this action.

inputs:
  python-version:
    description: Python version to set up
    required: false
    default: "3.12"
  extras:
    description: 'Comma-separated pip extras to install, e.g. "dev, cueq"'
    required: false
    default: "dev"
  pip-packages:
    description: Extra pip packages to install after the project (space-separated)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install mace with extras [${{ inputs.extras }}]
      shell: bash
      env:
        PIP_DEFAULT_TIMEOUT: "120"
      run: |
        python -m pip install -U pip
        python -m pip install --retries 5 ".[${{ inputs.extras }}]"
        if [ -n "${{ inputs.pip-packages }}" ]; then
          python -m pip install --retries 5 ${{ inputs.pip-packages }}
        fi

    - name: Log installed environment
      shell: bash
      run: python -m pip freeze
